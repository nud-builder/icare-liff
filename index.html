<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ระบุเหตุผล — งานค้าง Mark Complete</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'LINE Seed Sans TH', 'Sarabun', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Header ─── */
    .header {
      background: #E53935;
      color: #fff;
      padding: 16px 20px 14px;
    }
    .header .label { font-size: 12px; opacity: 0.85; margin-bottom: 4px; }
    .header .branch-name { font-size: 18px; font-weight: bold; line-height: 1.3; }
    .header .sub { font-size: 12px; margin-top: 4px; opacity: 0.8; }

    /* ─── Form ─── */
    .form-body {
      flex: 1;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .field-group label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      color: #333;
      margin-bottom: 8px;
    }
    .field-group label span.req { color: #E53935; margin-left: 3px; }

    /* Reason chips */
    .chip-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .chip {
      padding: 7px 14px;
      border-radius: 20px;
      border: 1.5px solid #BDBDBD;
      background: #fff;
      font-size: 13px;
      color: #555;
      cursor: pointer;
      transition: all .15s;
      user-select: none;
    }
    .chip.selected {
      border-color: #E53935;
      background: #FFEBEE;
      color: #C62828;
      font-weight: bold;
    }

    textarea {
      width: 100%;
      border: 1.5px solid #BDBDBD;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border-color .15s;
      color: #333;
      background: #fff;
    }
    textarea:focus { border-color: #E53935; }
    textarea::placeholder { color: #BDBDBD; }

    /* Action items */
    .action-grid { display: flex; flex-direction: column; gap: 8px; }
    .action-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1.5px solid #BDBDBD;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      color: #444;
      transition: all .15s;
    }
    .action-item.selected {
      border-color: #1565C0;
      background: #E3F2FD;
      color: #0D47A1;
      font-weight: bold;
    }
    .action-item .dot {
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 2px solid #BDBDBD;
      flex-shrink: 0;
      transition: all .15s;
    }
    .action-item.selected .dot {
      border-color: #1565C0;
      background: #1565C0;
    }

    /* ─── Footer ─── */
    .footer { padding: 16px; background: #fff; border-top: 1px solid #eee; }
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: #E53935;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-submit:active { background: #B71C1C; }
    .btn-submit:disabled { background: #BDBDBD; cursor: not-allowed; }

    /* ─── Success screen ─── */
    .success-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 40px 24px;
      text-align: center;
      gap: 16px;
    }
    .success-screen.show { display: flex; }
    .success-icon { font-size: 64px; }
    .success-title { font-size: 20px; font-weight: bold; color: #2E7D32; }
    .success-sub { font-size: 14px; color: #666; line-height: 1.6; }
    .btn-close {
      margin-top: 8px;
      padding: 12px 32px;
      background: #2E7D32;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
    }

    /* ─── Loading overlay ─── */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .overlay.show { display: flex; }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid #fff3;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ─── Header ─── -->
<div class="header" id="headerSection">
  <div class="label">🔴 งานค้าง Mark Complete</div>
  <div class="branch-name" id="branchName">กำลังโหลด...</div>
  <div class="sub" id="subInfo"></div>
</div>

<!-- ─── Form ─── -->
<div class="form-body" id="formSection">

  <!-- Field 1: เหตุผล -->
  <div class="field-group">
    <label>เหตุผลที่ยังค้าง <span class="req">*</span></label>
    <div class="chip-grid" id="reasonChips">
      <div class="chip" data-val="Mark Completed เรียบร้อย">Mark Completed เรียบร้อย</div>
      <div class="chip" data-val="รอลูกค้ามารับสินค้า">รอลูกค้ามารับสินค้า</div>
      <div class="chip" data-val="ลูกค้าติดต่อไม่ได้">ลูกค้าติดต่อไม่ได้</div>
      <div class="chip" data-val="รอ Parts ที่แอดเพิ่ม">รอ Parts</div>
      <div class="chip" data-val="รอ Apple ตอบ Escalation">รอ Apple ตอบ Escalation</div>
      <div class="chip" data-val="รอระบบ Auto Mark Complete">รอระบบ Auto Mark</div>
      <div class="chip" data-val="อื่นๆ">อื่นๆ →</div>
    </div>
    <textarea id="reasonOther" rows="2"
      placeholder="รายละเอียดเพิ่มเติม (ถ้ามี)..."></textarea>
  </div>

  <!-- Field 2: การดำเนินการ -->
  <div class="field-group">
    <label>การดำเนินการที่วางแผน <span class="req">*</span></label>
    <div class="action-grid" id="actionItems">
      <div class="action-item" data-val="โทรหาลูกค้าวันนี้">
        <div class="dot"></div>โทรหาลูกค้าวันนี้
      </div>
      <div class="action-item" data-val="ส่ง SMS / LINE / email แจ้งลูกค้า">
        <div class="dot"></div>ส่ง SMS / LINE / Emial แจ้งลูกค้า
      </div>
      <div class="action-item" data-val="Escalation Apple">
        <div class="dot"></div>Escalation to Apple
      </div>
      <div class="action-item" data-val="รอดำเนินการต่อ (ระบุในช่องอื่นๆ)">
        <div class="dot"></div>รอดำเนินการต่อ
      </div>
    </div>
    <textarea id="actionOther" rows="2" style="margin-top:10px"
      placeholder="รายละเอียดการดำเนินการเพิ่มเติม..."></textarea>
  </div>

</div>

<!-- ─── Submit button ─── -->
<div class="footer" id="footerSection">
  <button class="btn-submit" id="btnSubmit" disabled onclick="handleSubmit()">
    ส่งข้อมูล
  </button>
</div>

<!-- ─── Success screen ─── -->
<div class="success-screen" id="successScreen">
  <div class="success-icon">✅</div>
  <div class="success-title">ส่งข้อมูลแล้ว</div>
  <div class="success-sub" id="successDetail"></div>
  <button class="btn-close" onclick="window.close()">ปิดหน้าต่างนี้</button>
</div>

<!-- ─── Loading ─── -->
<div class="overlay" id="overlay">
  <div class="spinner"></div>
</div>

<script>
  // ═══════════════════════════════════════════════════════════
  //  ⚙️  ตั้งค่า Apps Script Web App URL ตรงนี้
  //  → Apps Script → Deploy → Manage Deployments → copy URL
  // ═══════════════════════════════════════════════════════════
  var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyI92CBA4gN7YxfszACYE-Oaj58s4LM3xeScs4wl48D2kIeV8LShDHQ8ThJQtAdGN094Q/exec';
  // ตัวอย่าง: 'https://script.google.com/macros/s/AKfycbxxxxx.../exec'

  // ─── State ──────────────────────────────────────────────────
  var selectedReason = '';
  var selectedAction = '';
  var shipTo         = '';
  var branchName     = '';

  // ─── Init ───────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', function() {
    var params    = new URLSearchParams(window.location.search);
    shipTo        = params.get('shipTo') || '';
    branchName    = params.get('branch') || 'สาขา';
    var itemCount = params.get('items')  || '';
    var maxDays   = params.get('days')   || '';

    document.getElementById('branchName').textContent = branchName;
    if (itemCount && maxDays) {
      document.getElementById('subInfo').textContent =
        'พบ ' + itemCount + ' รายการ  |  ค้างสูงสุด ' + maxDays + ' วัน';
    }

    // Chips: เหตุผล
    document.querySelectorAll('#reasonChips .chip').forEach(function(chip) {
      chip.addEventListener('click', function() {
        document.querySelectorAll('#reasonChips .chip')
          .forEach(function(c) { c.classList.remove('selected'); });
        chip.classList.add('selected');
        selectedReason = chip.dataset.val;
        updateBtn();
      });
    });

    // Chips: การดำเนินการ
    document.querySelectorAll('#actionItems .action-item').forEach(function(item) {
      item.addEventListener('click', function() {
        document.querySelectorAll('#actionItems .action-item')
          .forEach(function(i) { i.classList.remove('selected'); });
        item.classList.add('selected');
        selectedAction = item.dataset.val;
        updateBtn();
      });
    });

    document.getElementById('reasonOther').addEventListener('input', updateBtn);
    document.getElementById('actionOther').addEventListener('input', updateBtn);
  });

  function updateBtn() {
    document.getElementById('btnSubmit').disabled =
      !(selectedReason && selectedAction);
  }

  // ─── Submit ─────────────────────────────────────────────────
  function handleSubmit() {
    // รวม reason + detail
    var reason = selectedReason;
    var extraR = document.getElementById('reasonOther').value.trim();
    if (extraR) reason += ' (' + extraR + ')';

    // รวม action + detail
    var action = selectedAction;
    var extraA = document.getElementById('actionOther').value.trim();
    if (extraA) action += ' — ' + extraA;

    showOverlay(true);

    // ส่ง POST ไป Apps Script — ใช้ URLSearchParams (ไม่มี CORS preflight)
    var body = new URLSearchParams({
      type    : 'repair_reason',
      shipTo  : shipTo,
      reason  : reason,
      action  : action
    });

    fetch(APPS_SCRIPT_URL, {
      method      : 'POST',
      body        : body,
      redirect    : 'follow'
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      showOverlay(false);
      if (data && data.status === 'ok') {
        showSuccess(reason, action);
      } else {
        alert('⚠️ บันทึกไม่สำเร็จ: ' + (data && data.message ? data.message : 'Unknown'));
      }
    })
    .catch(function(err) {
      showOverlay(false);
      alert('❌ เชื่อมต่อไม่ได้: ' + err.message);
    });
  }

  function showSuccess(reason, action) {
    // ซ่อน form — แสดง success
    document.getElementById('formSection').style.display   = 'none';
    document.getElementById('footerSection').style.display = 'none';
    document.getElementById('successScreen').classList.add('show');
    document.getElementById('successDetail').innerHTML =
      '<b>' + branchName + '</b><br>'
      + '📋 เหตุผล: ' + reason + '<br>'
      + '✅ การดำเนินการ: ' + action;
  }

  function showOverlay(show) {
    document.getElementById('overlay').classList.toggle('show', show);
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ระบุเหตุผล — งานค้าง Mark Complete</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'LINE Seed Sans TH', 'Sarabun', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Header ─── */
    .header {
      background: #E53935;
      color: #fff;
      padding: 16px 20px 14px;
    }
    .header .label {
      font-size: 12px;
      opacity: 0.85;
      margin-bottom: 4px;
    }
    .header .branch-name {
      font-size: 18px;
      font-weight: bold;
      line-height: 1.3;
    }
    .header .sub {
      font-size: 12px;
      margin-top: 4px;
      opacity: 0.8;
    }

    /* ─── Form ─── */
    .form-body {
      flex: 1;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .field-group label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      color: #333;
      margin-bottom: 8px;
    }
    .field-group label span.req {
      color: #E53935;
      margin-left: 3px;
    }

    /* Reason chips */
    .chip-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }
    .chip {
      padding: 7px 14px;
      border-radius: 20px;
      border: 1.5px solid #BDBDBD;
      background: #fff;
      font-size: 13px;
      color: #555;
      cursor: pointer;
      transition: all .15s;
      user-select: none;
    }
    .chip.selected {
      border-color: #E53935;
      background: #FFEBEE;
      color: #C62828;
      font-weight: bold;
    }

    textarea {
      width: 100%;
      border: 1.5px solid #BDBDBD;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border-color .15s;
      color: #333;
      background: #fff;
    }
    textarea:focus { border-color: #E53935; }
    textarea::placeholder { color: #BDBDBD; }

    /* Action chips */
    .action-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .action-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1.5px solid #BDBDBD;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      color: #444;
      transition: all .15s;
    }
    .action-item.selected {
      border-color: #1565C0;
      background: #E3F2FD;
      color: #0D47A1;
      font-weight: bold;
    }
    .action-item .dot {
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 2px solid #BDBDBD;
      flex-shrink: 0;
      transition: all .15s;
    }
    .action-item.selected .dot {
      border-color: #1565C0;
      background: #1565C0;
    }

    /* ─── Footer button ─── */
    .footer {
      padding: 16px;
      background: #fff;
      border-top: 1px solid #eee;
    }
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: #E53935;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-submit:active { background: #B71C1C; }
    .btn-submit:disabled {
      background: #BDBDBD;
      cursor: not-allowed;
    }

    /* ─── Loading / Toast ─── */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .overlay.show { display: flex; }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid #fff3;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 80px; left: 50%; transform: translateX(-50%);
      background: #323232;
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 200;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- Header (จะถูก populate จาก URL params) -->
<div class="header">
  <div class="label">🔴 งานค้าง Mark Complete</div>
  <div class="branch-name" id="branchName">กำลังโหลด...</div>
  <div class="sub" id="subInfo"></div>
</div>

<!-- Form -->
<div class="form-body">

  <!-- Field 1: เหตุผล -->
  <div class="field-group">
    <label>เหตุผลที่ยังค้าง <span class="req">*</span></label>
    <div class="chip-grid" id="reasonChips">
      <div class="chip" data-val="รอลูกค้าติดต่อกลับ">รอลูกค้าติดต่อกลับ</div>
      <div class="chip" data-val="ลูกค้าติดต่อไม่ได้">ลูกค้าติดต่อไม่ได้</div>
      <div class="chip" data-val="รอ Parts">รอ Parts</div>
      <div class="chip" data-val="รอ Apple Approve">รอ Apple Approve</div>
      <div class="chip" data-val="รอลูกค้า Confirm ราคา">รอลูกค้า Confirm ราคา</div>
      <div class="chip" data-val="อื่นๆ">อื่นๆ ระบุเพิ่ม →</div>
    </div>
    <textarea id="reasonOther" rows="2"
      placeholder="รายละเอียดเพิ่มเติม (ถ้ามี)..."></textarea>
  </div>

  <!-- Field 2: การดำเนินการ -->
  <div class="field-group">
    <label>การดำเนินการที่วางแผน <span class="req">*</span></label>
    <div class="action-grid" id="actionItems">
      <div class="action-item" data-val="โทรหาลูกค้าวันนี้">
        <div class="dot"></div>โทรหาลูกค้าวันนี้
      </div>
      <div class="action-item" data-val="ส่ง SMS / LINE แจ้งลูกค้า">
        <div class="dot"></div>ส่ง SMS / LINE แจ้งลูกค้า
      </div>
      <div class="action-item" data-val="ประสานงาน Parts / Apple">
        <div class="dot"></div>ประสานงาน Parts / Apple
      </div>
      <div class="action-item" data-val="รอดำเนินการต่อ (ระบุในช่องอื่นๆ)">
        <div class="dot"></div>รอดำเนินการต่อ
      </div>
    </div>
    <textarea id="actionOther" rows="2" style="margin-top:10px"
      placeholder="รายละเอียดการดำเนินการเพิ่มเติม..."></textarea>
  </div>

</div>

<!-- Submit -->
<div class="footer">
  <button class="btn-submit" id="btnSubmit" disabled onclick="handleSubmit()">
    ส่งข้อมูล
  </button>
</div>

<!-- Loading overlay -->
<div class="overlay" id="overlay">
  <div class="spinner"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ─── State ──────────────────────────────────────────
  var selectedReason = '';
  var selectedAction = '';
  var shipTo = '';
  var branchName = '';

  // ─── Init ────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', function() {
    // อ่าน params จาก URL
    var params = new URLSearchParams(window.location.search);
    shipTo     = params.get('shipTo') || '';
    branchName = params.get('branch') || 'สาขา';
    var itemCount = params.get('items') || '';
    var maxDays   = params.get('days')  || '';

    document.getElementById('branchName').textContent = branchName;
    if (itemCount && maxDays) {
      document.getElementById('subInfo').textContent =
        'พบ ' + itemCount + ' รายการ  |  ค้างสูงสุด ' + maxDays + ' วัน';
    }

    // Chip: เหตุผล
    document.querySelectorAll('#reasonChips .chip').forEach(function(chip) {
      chip.addEventListener('click', function() {
        document.querySelectorAll('#reasonChips .chip').forEach(function(c) {
          c.classList.remove('selected');
        });
        chip.classList.add('selected');
        selectedReason = chip.dataset.val;
        updateSubmitBtn();
      });
    });

    // Chip: การดำเนินการ
    document.querySelectorAll('#actionItems .action-item').forEach(function(item) {
      item.addEventListener('click', function() {
        document.querySelectorAll('#actionItems .action-item').forEach(function(i) {
          i.classList.remove('selected');
        });
        item.classList.add('selected');
        selectedAction = item.dataset.val;
        updateSubmitBtn();
      });
    });

    // Textarea change
    document.getElementById('reasonOther').addEventListener('input', updateSubmitBtn);
    document.getElementById('actionOther').addEventListener('input', updateSubmitBtn);

    // Init LIFF
    liff.init({ liffId: '__LIFF_ID__' })
      .then(function() {
        if (!liff.isLoggedIn()) { liff.login(); }
      })
      .catch(function(err) {
        console.warn('LIFF init error (preview mode):', err);
        // ถ้า init ไม่ได้ (ทดสอบใน browser ปกติ) ก็ยังใช้งาน UI ได้
      });
  });

  function updateSubmitBtn() {
    var hasReason = selectedReason !== '';
    var hasAction = selectedAction !== '';
    document.getElementById('btnSubmit').disabled = !(hasReason && hasAction);
  }

  // ─── Submit ──────────────────────────────────────────
  function handleSubmit() {
    var reasonText = selectedReason;
    var otherReason = document.getElementById('reasonOther').value.trim();
    if (otherReason) reasonText += ' (' + otherReason + ')';

    var actionText = selectedAction;
    var otherAction = document.getElementById('actionOther').value.trim();
    if (otherAction) actionText += ' — ' + otherAction;

    // format ที่ doPost จะจับ: เหตุผล:{shipTo}:{reason} | {action}
    var msgText = 'เหตุผล:' + shipTo + ':' + reasonText + ' | ' + actionText;

    showOverlay(true);

    // ส่งข้อความกลับกลุ่ม LINE
    var sendPromise;
    try {
      sendPromise = liff.sendMessages([{ type: 'text', text: msgText }]);
    } catch(e) {
      // fallback สำหรับ test ใน browser ปกติ
      sendPromise = Promise.resolve();
      console.log('[TEST] จะส่ง:', msgText);
    }

    sendPromise
      .then(function() {
        showOverlay(false);
        showToast('✅ ส่งข้อมูลแล้ว');
        setTimeout(function() {
          try { liff.closeWindow(); } catch(e) { window.close(); }
        }, 1200);
      })
      .catch(function(err) {
        showOverlay(false);
        showToast('❌ ส่งไม่สำเร็จ: ' + err.message);
      });
  }

  function showOverlay(show) {
    document.getElementById('overlay').classList.toggle('show', show);
  }

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2500);
  }
</script>
</body>
</html>
